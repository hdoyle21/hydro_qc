name: Collect Hydro-Québec Outages

on:
  schedule:
    # Every 15 minutes. GitHub Actions minimum is 5 min;
    # note runs may be delayed by a few minutes under load.
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # faster binary package installs

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            httr
            jsonlite
            dplyr
            tibble
            purrr
            readr

      - name: Run collector
        run: Rscript collect.R

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "data: snapshot $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
